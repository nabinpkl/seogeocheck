# ── Test Profile ─────────────────────────────────────────────
# Uses H2 in-memory database instead of PostgreSQL
# Disables Temporal auto-discovery so tests don't need a running Temporal server

spring.application.name=seogeocheck-test

# H2 in-memory database
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# Disable Temporal auto-config for unit tests (we use TestWorkflowEnvironment instead)
spring.temporal.test-server.enabled=true
spring.temporal.workers-auto-discovery.packages=com.nabin.distributedai.temporal
