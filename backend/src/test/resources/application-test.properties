# ── Test Profile ─────────────────────────────────────────────
# Uses H2 in-memory database instead of PostgreSQL
# Disables Temporal auto-discovery so tests don't need a running Temporal server

spring.application.name=seogeocheck-test

# H2 in-memory database
spring.datasource.url=jdbc:h2:mem:testdb;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# Disable Temporal auto-config for unit tests (we use TestWorkflowEnvironment instead)
spring.temporal.test-server.enabled=true
spring.temporal.workers-auto-discovery.packages=com.nabin.seogeo.temporal

seogeo.audit.report-signing-secret=test-signing-secret
seogeo.seo-signals.task-queue=seogeo-seo-signals-test
seogeo.seo-signals.activity-timeout=5s
seogeo.kafka.progress.consumer-enabled=false
spring.kafka.bootstrap-servers=localhost:19092
server.servlet.session.cookie.secure=false
seogeo.auth.oauth.issuer=http://localhost
seogeo.auth.oauth.key-id=test-mcp
seogeo.auth.oauth.private-
seogeo.auth.oauth.public-
seogeo.auth.oauth.clients[0].id=test-claude-code
seogeo.auth.oauth.clients[0].client-id=claude-code-test
seogeo.auth.oauth.clients[0].client-name=Claude Code Test
seogeo.auth.oauth.clients[0].redirect-uris[0]=https://claude.ai/oauth/callback
