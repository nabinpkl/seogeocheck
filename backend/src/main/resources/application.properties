spring.application.name=seogeocheck
spring.profiles.default=local

# Temporal Configuration
spring.temporal.connection.target=${SPRING_TEMPORAL_CONNECTION_TARGET:127.0.0.1:7233}
spring.temporal.namespace=default
spring.temporal.workers-auto-discovery.packages=com.nabin.seogeo.temporal

# Database Configuration
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/seogeo}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.hibernate.ddl-auto=validate
spring.flyway.enabled=true

seogeo.audit.task-queue=${SEO_GEO_AUDIT_TASK_QUEUE:seogeo-audit}
seogeo.audit.sse-poll-interval=${SEO_GEO_AUDIT_SSE_POLL_INTERVAL:500ms}
seogeo.audit.sse-heartbeat-interval=${SEO_GEO_AUDIT_SSE_HEARTBEAT_INTERVAL:10s}
seogeo.audit.report-signing-secret=${AUDIT_REPORT_SIGNING_SECRET}
seogeo.lighthouse.base-url=${LIGHTHOUSE_BASE_URL:http://localhost:3001}
seogeo.lighthouse.request-timeout=${LIGHTHOUSE_REQUEST_TIMEOUT:65s}
