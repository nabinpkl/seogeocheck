spring.application.name=seogeocheck
spring.profiles.default=local

# Temporal Configuration
spring.temporal.connection.target=${SPRING_TEMPORAL_CONNECTION_TARGET:127.0.0.1:7233}
spring.temporal.namespace=default
spring.temporal.workers-auto-discovery.packages=com.nabin.seogeo.temporal

# Database Configuration
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/seogeo}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.hibernate.ddl-auto=validate
spring.flyway.enabled=true
spring.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
spring.kafka.consumer.enable-auto-commit=false
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.group-id=${KAFKA_PROGRESS_GROUP_ID:seogeo-audit-progress-projector}
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.apache.kafka.common.serialization.StringSerializer

seogeo.audit.task-queue=${SEO_GEO_AUDIT_TASK_QUEUE:seogeo-audit}
seogeo.audit.sse-poll-interval=${SEO_GEO_AUDIT_SSE_POLL_INTERVAL:500ms}
seogeo.audit.sse-heartbeat-interval=${SEO_GEO_AUDIT_SSE_HEARTBEAT_INTERVAL:10s}
seogeo.audit.report-signing-secret=${AUDIT_REPORT_SIGNING_SECRET}
seogeo.seo-signals.task-queue=${SEO_GEO_SEO_SIGNALS_TASK_QUEUE:seogeo-seo-signals}
seogeo.seo-signals.activity-timeout=${SEO_GEO_SEO_SIGNALS_ACTIVITY_TIMEOUT:65s}
seogeo.kafka.progress.topic=${KAFKA_PROGRESS_TOPIC:seogeo.audit.progress.v1}
seogeo.kafka.progress.dlq-topic=${KAFKA_PROGRESS_DLQ_TOPIC:seogeo.audit.progress.dlq.v1}
seogeo.kafka.progress.consumer-enabled=${KAFKA_PROGRESS_CONSUMER_ENABLED:true}
