spring.application.name=seogeocheck
spring.profiles.default=local
spring.threads.virtual.enabled=true

# Temporal Configuration
spring.temporal.connection.target=${SPRING_TEMPORAL_CONNECTION_TARGET:127.0.0.1:7233}
spring.temporal.namespace=default
spring.temporal.workers-auto-discovery.packages=com.nabin.seogeo.temporal

# Database Configuration
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/seogeo}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.hibernate.ddl-auto=validate
spring.flyway.enabled=true

spring.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
spring.kafka.consumer.enable-auto-commit=false
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.group-id=${KAFKA_PROGRESS_GROUP_ID:seogeo-audit-progress-projector}
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.apache.kafka.common.serialization.StringSerializer

spring.mail.host=${SPRING_MAIL_HOST:localhost}
spring.mail.port=${SPRING_MAIL_PORT:1025}
spring.mail.username=${SPRING_MAIL_USERNAME:}
spring.mail.password=${SPRING_MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=${SPRING_MAIL_PROPERTIES_MAIL_SMTP_AUTH:false}
spring.mail.properties.mail.smtp.starttls.enable=${SPRING_MAIL_PROPERTIES_MAIL_SMTP_STARTTLS_ENABLE:false}

spring.session.store-type=jdbc
spring.session.jdbc.initialize-schema=never
server.servlet.session.cookie.name=seogeo_session
server.servlet.session.cookie.http-only=true
server.servlet.session.cookie.same-site=lax
server.servlet.session.cookie.secure=${SERVER_SERVLET_SESSION_COOKIE_SECURE:true}

seogeo.audit.task-queue=${SEO_GEO_AUDIT_TASK_QUEUE:seogeo-audit}
seogeo.audit.sse-poll-interval=${SEO_GEO_AUDIT_SSE_POLL_INTERVAL:500ms}
seogeo.audit.sse-heartbeat-interval=${SEO_GEO_AUDIT_SSE_HEARTBEAT_INTERVAL:10s}
seogeo.audit.report-signing-secret=${AUDIT_REPORT_SIGNING_SECRET}
seogeo.seo-signals.task-queue=${SEO_GEO_SEO_SIGNALS_TASK_QUEUE:seogeo-seo-signals}
seogeo.seo-signals.activity-timeout=${SEO_GEO_SEO_SIGNALS_ACTIVITY_TIMEOUT:65s}
seogeo.kafka.progress.topic=${KAFKA_PROGRESS_TOPIC:seogeo.audit.progress.v1}
seogeo.kafka.progress.dlq-topic=${KAFKA_PROGRESS_DLQ_TOPIC:seogeo.audit.progress.dlq.v1}
seogeo.kafka.progress.consumer-enabled=${KAFKA_PROGRESS_CONSUMER_ENABLED:true}

seogeo.auth.public-app-url=${SEO_GEO_AUTH_PUBLIC_APP_URL:http://localhost:3000}
seogeo.auth.from-email=${SEO_GEO_AUTH_FROM_EMAIL:no-reply@seogeocheck.local}
seogeo.auth.verification-token-ttl=${SEO_GEO_AUTH_VERIFICATION_TOKEN_TTL:30m}
seogeo.auth.verification-send-cooldown=${SEO_GEO_AUTH_VERIFICATION_SEND_COOLDOWN:60s}
seogeo.auth.verification-max-sends-per-hour=${SEO_GEO_AUTH_VERIFICATION_MAX_SENDS_PER_HOUR:5}
seogeo.auth.reset-token-ttl=${SEO_GEO_AUTH_RESET_TOKEN_TTL:30m}
seogeo.auth.reset-send-cooldown=${SEO_GEO_AUTH_RESET_SEND_COOLDOWN:60s}
seogeo.auth.reset-max-sends-per-hour=${SEO_GEO_AUTH_RESET_MAX_SENDS_PER_HOUR:5}
seogeo.auth.failed-login-window=${SEO_GEO_AUTH_FAILED_LOGIN_WINDOW:15m}
seogeo.auth.failed-login-max-delay=${SEO_GEO_AUTH_FAILED_LOGIN_MAX_DELAY:30s}
seogeo.auth.audit-claim-token-ttl=${SEO_GEO_AUTH_AUDIT_CLAIM_TOKEN_TTL:7d}
seogeo.auth.oauth.issuer=${SEO_GEO_AUTH_OAUTH_ISSUER}
seogeo.auth.oauth.key-id=${SEO_GEO_AUTH_OAUTH_KEY_ID}
seogeo.auth.oauth.private-key=${SEO_GEO_AUTH_OAUTH_PRIVATE_KEY}
seogeo.auth.oauth.public-key=${SEO_GEO_AUTH_OAUTH_PUBLIC_KEY}
seogeo.auth.oauth.authorization-code-ttl=${SEO_GEO_AUTH_OAUTH_AUTHORIZATION_CODE_TTL:5m}
seogeo.auth.oauth.access-token-ttl=${SEO_GEO_AUTH_OAUTH_ACCESS_TOKEN_TTL:15m}
seogeo.auth.oauth.refresh-token-ttl=${SEO_GEO_AUTH_OAUTH_REFRESH_TOKEN_TTL:30d}
seogeo.auth.oauth.mcp-scope=${SEO_GEO_AUTH_OAUTH_MCP_SCOPE:seogeo:mcp}
