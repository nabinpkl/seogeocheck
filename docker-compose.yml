
services:
  postgresql:
    image: postgres:${POSTGRESQL_VERSION}
    container_name: postgresql
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      # The entrypoint will only create the primary DB (distributed_ai).
      # Temporal auto-setup will handle creating its own (temporal and temporal_visibility).
      POSTGRES_DB: seogeo
    ports:
      - "5432:5432"
    networks:
      - temporal-network
    volumes:
      - /var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    
  temporal-admin-tools:
    image: temporalio/admin-tools:${TEMPORAL_ADMINTOOLS_VERSION}
    container_name: temporal-admin-tools
    restart: on-failure:6
    depends_on:
      postgresql:
        condition: service_healthy
    environment:
      - DB=postgres12
      - DB_PORT=5432
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PWD=${POSTGRES_PASSWORD}
      - POSTGRES_SEEDS=postgresql
      - SQL_PASSWORD=${POSTGRES_PASSWORD}
    networks:
      - temporal-network
    volumes:
      - ./scripts:/scripts
    entrypoint: ["/bin/sh"]
    command: /scripts/setup-postgres.sh


  temporal:
    image: temporalio/server:${TEMPORAL_VERSION}
    container_name: temporal
    depends_on:
      temporal-admin-tools:
        condition: service_completed_successfully
    environment:
      - DB=postgres12
      - DB_PORT=5432
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PWD=${POSTGRES_PASSWORD}
      - POSTGRES_SEEDS=postgresql
      - BIND_ON_IP=0.0.0.0
      - DYNAMIC_CONFIG_FILE_PATH=config/dynamicconfig/development-sql.yaml
    networks:
      - temporal-network
    ports:
      - '7233:7233'
    volumes:
      - ./temporalconfig:/etc/temporal/config/dynamicconfig
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "7233"]
      interval: 5s
      timeout: 3s
      start_period: 30s
      retries: 60

  temporal-create-namespace:
    image: temporalio/admin-tools:${TEMPORAL_ADMINTOOLS_VERSION}
    container_name: temporal-create-namespace
    restart: on-failure:5
    depends_on:
      temporal:
        condition: service_healthy
    environment:
      - TEMPORAL_ADDRESS=temporal:7233
      - DEFAULT_NAMESPACE=default
    networks:
      - temporal-network
    volumes:
      - ./scripts:/scripts
    entrypoint: ["/bin/sh"]
    command: /scripts/create-namespace.sh

  kafka:
    image: apache/kafka:${KAFKA_VERSION:-4.2.0}
    container_name: kafka
    hostname: kafka
    networks:
      - temporal-network
    ports:
      - "9092:9092"
    environment:
      - KAFKA_NODE_ID=1
      - KAFKA_PROCESS_ROLES=broker,controller
      - KAFKA_LISTENERS=PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      - KAFKA_ADVERTISED_LISTENERS=PLAINTEXT://kafka:9092
      - KAFKA_LISTENER_SECURITY_PROTOCOL_MAP=PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
      - KAFKA_CONTROLLER_LISTENER_NAMES=CONTROLLER
      - KAFKA_CONTROLLER_QUORUM_VOTERS=1@kafka:9093
      - KAFKA_INTER_BROKER_LISTENER_NAME=PLAINTEXT
      - KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR=1
      - KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR=1
      - KAFKA_TRANSACTION_STATE_LOG_MIN_ISR=1
      - KAFKA_MIN_INSYNC_REPLICAS=1
      - KAFKA_AUTO_CREATE_TOPICS_ENABLE=false
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server localhost:9092 >/dev/null 2>&1"]
      interval: 10s
      timeout: 5s
      retries: 10

  kafka-init:
    image: apache/kafka:${KAFKA_VERSION:-4.2.0}
    container_name: kafka-init
    restart: on-failure:5
    depends_on:
      kafka:
        condition: service_healthy
    networks:
      - temporal-network
    entrypoint: ["/bin/bash", "-lc"]
    command:
      - >-
        /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:9092 --create --if-not-exists
        --topic ${KAFKA_PROGRESS_TOPIC:-seogeo.audit.progress.v1} --partitions 6 --replication-factor 1 &&
        /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:9092 --create --if-not-exists
        --topic ${KAFKA_PROGRESS_DLQ_TOPIC:-seogeo.audit.progress.dlq.v1} --partitions 3 --replication-factor 1

  kafka-ui:
    image: provectuslabs/kafka-ui:${KAFKA_UI_VERSION:-latest}
    container_name: kafka-ui
    depends_on:
      kafka:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully
    networks:
      - temporal-network
    ports:
      - "8082:8080"
    environment:
      - KAFKA_CLUSTERS_0_NAME=local
      - KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS=kafka:9092

  mailpit:
    image: axllent/mailpit:${MAILPIT_VERSION:-latest}
    container_name: mailpit
    networks:
      - temporal-network
    ports:
      - "1025:1025"
      - "8025:8025"

  temporal-ui:
    image: temporalio/ui:${TEMPORAL_UI_VERSION}
    container_name: temporal-ui
    depends_on:
      temporal:
        condition: service_healthy
    environment:
      - TEMPORAL_ADDRESS=temporal:7233
      - TEMPORAL_CORS_ORIGINS=http://localhost:3000
    networks:
      - temporal-network
    ports:
      - "8081:8080"

  seo-audit-worker:
    build:
      context: .
      dockerfile: seo-audit-worker/Dockerfile
    container_name: seogeo-seo-audit-worker
    depends_on:
      temporal:
        condition: service_healthy
      temporal-create-namespace:
        condition: service_completed_successfully
      kafka:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully
    networks:
      - temporal-network
    environment:
      - TEMPORAL_ADDRESS=temporal:7233
      - TEMPORAL_NAMESPACE=default
      - SEO_AUDIT_TASK_QUEUE=${SEO_GEO_SEO_SIGNALS_TASK_QUEUE:-seogeo-seo-signals}
      - KAFKA_BOOTSTRAP_SERVERS=${KAFKA_BOOTSTRAP_SERVERS:-kafka:9092}
      - KAFKA_PROGRESS_TOPIC=${KAFKA_PROGRESS_TOPIC:-seogeo.audit.progress.v1}

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: seogeo-backend
    depends_on:
      postgresql:
        condition: service_healthy
      temporal:
        condition: service_healthy
      temporal-create-namespace:
        condition: service_completed_successfully
      kafka:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully
      mailpit:
        condition: service_started
    ports:
      - "8080:8080"
    networks:
      - temporal-network
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - SPRING_TEMPORAL_CONNECTION_TARGET=temporal:7233
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgresql:5432/seogeo
      - SPRING_DATASOURCE_USERNAME=${POSTGRES_USER}
      - SPRING_DATASOURCE_PASSWORD=${POSTGRES_PASSWORD}
      - AUDIT_REPORT_SIGNING_SECRET=${AUDIT_REPORT_SIGNING_SECRET}
      - SEO_GEO_SEO_SIGNALS_TASK_QUEUE=${SEO_GEO_SEO_SIGNALS_TASK_QUEUE:-seogeo-seo-signals}
      - KAFKA_BOOTSTRAP_SERVERS=${KAFKA_BOOTSTRAP_SERVERS:-kafka:9092}
      - KAFKA_PROGRESS_TOPIC=${KAFKA_PROGRESS_TOPIC:-seogeo.audit.progress.v1}
      - KAFKA_PROGRESS_DLQ_TOPIC=${KAFKA_PROGRESS_DLQ_TOPIC:-seogeo.audit.progress.dlq.v1}
      - KAFKA_PROGRESS_GROUP_ID=${KAFKA_PROGRESS_GROUP_ID:-seogeo-audit-progress-projector}
      - SPRING_MAIL_HOST=${SPRING_MAIL_HOST:-mailpit}
      - SPRING_MAIL_PORT=${SPRING_MAIL_PORT:-1025}
      - SEO_GEO_AUTH_PUBLIC_APP_URL=${SEO_GEO_AUTH_PUBLIC_APP_URL:-http://localhost:3000}
      - SEO_GEO_AUTH_FROM_EMAIL=${SEO_GEO_AUTH_FROM_EMAIL:-no-reply@seogeocheck.local}
      - SERVER_SERVLET_SESSION_COOKIE_SECURE=${SERVER_SERVLET_SESSION_COOKIE_SECURE:-false}
      - SEO_GEO_AUTH_OAUTH_ISSUER=${SEO_GEO_AUTH_OAUTH_ISSUER}
      - SEO_GEO_AUTH_OAUTH_KEY_ID=${SEO_GEO_AUTH_OAUTH_KEY_ID}
      - SEO_GEO_AUTH_OAUTH_PRIVATE_KEY=${SEO_GEO_AUTH_OAUTH_PRIVATE_KEY}
      - SEO_GEO_AUTH_OAUTH_PUBLIC_KEY=${SEO_GEO_AUTH_OAUTH_PUBLIC_KEY}
      - SEO_GEO_AUTH_OAUTH_CLIENTS_0_ID=${SEO_GEO_AUTH_OAUTH_CLIENTS_0_ID}
      - SEO_GEO_AUTH_OAUTH_CLIENTS_0_CLIENT_ID=${SEO_GEO_AUTH_OAUTH_CLIENTS_0_CLIENT_ID}
      - SEO_GEO_AUTH_OAUTH_CLIENTS_0_CLIENT_NAME=${SEO_GEO_AUTH_OAUTH_CLIENTS_0_CLIENT_NAME}
      - SEO_GEO_AUTH_OAUTH_CLIENTS_0_REDIRECT_URIS_0=${SEO_GEO_AUTH_OAUTH_CLIENTS_0_REDIRECT_URIS_0}

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        PORT: ${FRONTEND_PORT:-3000}
    container_name: seogeo-frontend
    depends_on:
      backend:
        condition: service_started
    ports:
      - "${FRONTEND_PORT:-3000}:${FRONTEND_PORT:-3000}"
    networks:
      - temporal-network
    environment:
      - NODE_ENV=production
      - PORT=${FRONTEND_PORT:-3000}
      - BACKEND_URL=http://backend:8080
      - NEXT_PUBLIC_BACKEND_URL=http://backend:8080

tunnel:
    image: cloudflare/cloudflared:latest
    restart: unless-stopped
    profiles: ["prod"]
    environment:
      - TUNNEL_TOKEN=${CLOUDFLARE_TUNNEL_TOKEN}
    command: tunnel --no-autoupdate run
    networks:
      - temporal-network

networks:
  temporal-network:
    driver: bridge
    name: temporal-network
